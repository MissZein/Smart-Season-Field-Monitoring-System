<tr id="field-row-{{ field.id }}">
    <td><strong>{{ field.name }}</strong></td>
    <td>{{ field.crop_type }}</td>
    <td>{{ field.planting_date|date:"d M Y" }}</td>
    <td>
        <select name="current_stage" 
                hx-post="{% url 'update_field_status' field.id %}" 
                hx-trigger="change" 
                hx-target="#field-row-{{ field.id }}" 
                hx-swap="outerHTML">
            {% for value, label in field.STAGE_CHOICES %}
                <option value="{{ value }}" {% if field.current_stage == value %}selected{% endif %}>
                    {{ label }}
                </option>
            {% endfor %}
        </select>
    </td>
    <td>
        <span class="badge {{ field.field_status|lower|slugify|cut:'-' }}">
            {{ field.field_status }}
        </span>
    </td>
    
    {% if is_admin %}
    <td>
    <select name="agent_id" 
            hx-post="{% url 'assign_agent' field.id %}" 
            hx-target="#field-row-{{ field.id }}" 
            hx-swap="outerHTML">
        <option value="" {% if not field.assigned_agent %}selected{% endif %}>Unassigned</option>
        {% for agent in all_agents %}
            <option value="{{ agent.id }}" 
                {% if field.assigned_agent.id == agent.id %}selected{% endif %}>
                {{ agent.username }}
            </option>
        {% endfor %}
    </select>
</td>
    {% endif %}

    <td id="notes-{{ field.id }}">
        {{ field.notes|truncatechars:20|default:"--" }}
        <button hx-get="{% url 'edit_notes' field.id %}" 
                hx-target="#notes-{{ field.id }}" 
                style="border:none; background:none; color:blue; cursor:pointer;">
            ✎
        </button>
    </td>
</tr>
