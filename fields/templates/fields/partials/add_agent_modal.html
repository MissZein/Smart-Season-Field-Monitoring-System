<div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000;">
    <div style="background:white; padding:30px; border-radius:12px; width:350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0; color: #2e7d32;">Register New Agent</h3>
        <p style="font-size: 13px; color: #666;">This will create a new login for the agent.</p>
        
        <form action="{% url 'save_new_agent' %}" method="POST">
            {% csrf_token %}
            <div style="margin-bottom:15px;">
                <label style="font-size:12px; font-weight:bold;">Username:</label><br>
                <input type="text" name="username" placeholder="e.g. agent_kenya" required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
            </div>
            <div style="margin-bottom:20px;">
                <label style="font-size:12px; font-weight:bold;">Temporary Password:</label><br>
                <input type="password" name="password" required style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
            </div>
            
            <div style="display:flex; gap:10px;">
                <button type="submit" style="background:#2e7d32; color:white; border:none; padding:10px 15px; border-radius:4px; flex:1; cursor:pointer;">Save Agent</button>
                <button type="button" onclick="this.parentElement.parentElement.parentElement.parentElement.remove()" style="background:#eee; border:none; padding:10px 15px; border-radius:4px; cursor:pointer;">Cancel</button>
            </div>
        </form>
    </div>
</div>
