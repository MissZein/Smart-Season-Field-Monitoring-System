<div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000;">
    <div style="background:white; padding:30px; border-radius:12px; width:400px;">
        <h3>Create New Field Task</h3>
        <form action="{% url 'save_new_field' %}" method="POST">
            {% csrf_token %}
            <label>Field Name:</label><br>
            <input type="text" name="name" required style="width:100%; margin-bottom:10px;"><br>
            <label>Crop Type:</label><br>
            <input type="text" name="crop" required style="width:100%; margin-bottom:10px;"><br>
            <label>Planting Date:</label><br>
            <input type="date" name="date" required style="width:100%; margin-bottom:10px;"><br>
            <label>Assign to Agent:</label><br>
            <select name="agent_id" style="width:100%; margin-bottom:20px;">
                <option value="">-- Leave Unassigned --</option>
                {% for agent in agents %}
                    <option value="{{ agent.id }}">{{ agent.username }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn-save">Create Task</button>
            <button type="button" onclick="this.parentElement.parentElement.parentElement.remove()">Cancel</button>
        </form>
    </div>
</div>
